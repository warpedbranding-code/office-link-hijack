<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops!</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #111, #222);
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            padding: 50px;
            max-width: 700px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.75rem;
            color: #ddd;
            line-height: 1.5;
        }

        .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="emoji">😂</div>

    <h1>Nick, you spelled it wrong.</h1>

    <p><strong>LOL.</strong></p>
</div>

</body>
</html>
